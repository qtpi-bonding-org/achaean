services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: achaean
      POSTGRES_PASSWORD: "5CyIG9T3quC6IAOo86uM3Q9n5L8UWxaM"
    volumes:
      - achaean_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "fEZzkgSVERwqrLFCD1o-HMOgwR112gOZ"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: achaean_test
      POSTGRES_PASSWORD: "VoR3-AKFhZdARNz_m_MdSy3A1iac1i0r"
    volumes:
      - achaean_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "I6tiPz_hO5RrBo1usBo5WmkJO5KJ5yF4"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  achaean_data:
  achaean_test_data:
