# Configuration for running inside docker-compose alongside Forgejo + Postgres.
# The database host is the postgres service name from docker-compose.

apiServer:
  port: 8080
  publicHost: localhost
  publicPort: 8080
  publicScheme: http

insightsServer:
  port: 8081
  publicHost: localhost
  publicPort: 8081
  publicScheme: http

webServer:
  port: 8082
  publicHost: localhost
  publicPort: 8082
  publicScheme: http

database:
  host: postgres
  port: 5432
  name: achaean
  user: achaean

redis:
  enabled: false
  host: redis
  port: 6379

maxRequestSize: 524288

sessionLogs:
  persistentEnabled: true
  consoleEnabled: true
  consoleLogFormat: text
