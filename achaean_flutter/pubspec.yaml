name: achaean_flutter
description: Achaean - A Flutter application with Serverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.8.0'
  flutter: '^3.32.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Serverpod
  achaean_client:
    path: ../achaean_client
  serverpod_client: 3.4.1
  serverpod_flutter: 3.4.1

  # Architecture & State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Koinon
  dart_git:
    path: ../dart_git
  dart_koinon:
    path: ../dart_koinon

  # Custom Libraries
  cubit_ui_flow:
    git:
      url: git@github.com:qtpi-bonding-org/flutter_cubit_ui_flow.git
      ref: 737f24b
  flutter_error_privserver:
    git:
      url: git@github.com:qtpi-bonding-org/flutter_error_privserver.git
      ref: 3565d9d47f24bee06bc88314b51a7df04ee3f78e
  flutter_color_palette:
    git: git@github.com:qtpi-bonding-org/flutter_color_palette.git
  l10n_key_resolver:
    git:
      url: git@github.com:qtpi-bonding-org/dart_l10n_key_resolver.git
      ref: 0ca0e58
  dart_jwk_duo:
    git:
      url: https://github.com/qtpi-bonding-org/dart_jwk_duo.git
      ref: 57951f2de99784c3fc4664f7b66bb13ce6e80bc7

  # Navigation
  go_router: ^14.0.0

  # Code Generation Support
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Utilities
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^10.0.0
  yaml: ^3.1.0

dev_dependencies:
  flutter_lints: '>=3.0.0 <7.0.0'
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/config.json
