services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: achaean-forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=forgejo
      - FORGEJO__database__PASSWD=forgejo
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__service__DISABLE_REGISTRATION=false
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
      - FORGEJO__api__ENABLE_SWAGGER=true
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__webhook__ALLOWED_HOST_LIST=radicle,synedrion
      # Enable Forgejo as OAuth2/OIDC provider
      - FORGEJO__oauth2__ENABLED=true
      - FORGEJO__oauth2__JWT_SIGNING_ALGORITHM=RS256
      # CORS for Flutter web dev
      - FORGEJO__cors__ENABLED=true
      - FORGEJO__cors__ALLOW_DOMAIN=*
      - FORGEJO__cors__SCHEME=http
    volumes:
      - forgejo_data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  synedrion:
    build:
      context: .
      dockerfile: achaean_server/Dockerfile
    container_name: achaean-synedrion
    environment:
      - runmode=staging
      - serverid=default
      - logging=normal
      - role=monolith
      - FORGEJO_INTERNAL_HOST=forgejo
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  radicle:
    build: ./radicle
    container_name: achaean-radicle
    volumes:
      - radicle_data:/root/.radicle
      - radicle_mirrors:/var/radicle-mirrors
      - forgejo_data:/forgejo-data:ro
      - ./radicle/mirror-to-radicle.sh:/usr/local/bin/mirror-to-radicle.sh:ro
    ports:
      - "8776:8776"
      - "8880:8080"
    restart: unless-stopped

  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: achaean-postgres
    environment:
      - POSTGRES_USER=achaean
      - POSTGRES_PASSWORD=achaean
      - POSTGRES_DB=achaean
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U achaean"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  forgejo_data:
  radicle_data:
  radicle_mirrors:
  postgres_data:
