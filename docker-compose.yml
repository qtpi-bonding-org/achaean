services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: achaean-forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=forgejo
      - FORGEJO__database__PASSWD=forgejo
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__service__DISABLE_REGISTRATION=false
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
      - FORGEJO__api__ENABLE_SWAGGER=true
      - FORGEJO__security__INSTALL_LOCK=true
    volumes:
      - forgejo_data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: achaean-postgres
    environment:
      - POSTGRES_USER=achaean
      - POSTGRES_PASSWORD=achaean
      - POSTGRES_DB=achaean
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U achaean"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  forgejo_data:
  postgres_data:
